name: release

# Tag-triggered cross-platform release. Push a `v*` tag (or run manually with a
# tag input) and tauri-action builds the installers on each OS and uploads them
# to a GitHub release. The release is created as a DRAFT — verify all artifacts,
# then publish it (gh release edit <tag> --draft=false).
#
# Installers carry FREE ed25519/minisign UPDATER signatures (TAURI_SIGNING_*
# secrets) so the auto-updater can verify downloads, and tauri-action uploads
# latest.json alongside them. Distribution signing is still absent: no
# Apple/Windows code-signing certs, so macOS users see a Gatekeeper warning and
# Windows users see SmartScreen until paid certs are wired into this step's env.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build/publish (e.g. v0.19.84)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: release (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        # Native build per OS/arch — Win (MSI+NSIS), macOS arm64 + Intel,
        # Linux (deb/rpm/AppImage). Mirrors the green ci.yml build matrix.
        platform: [windows-latest, macos-14, macos-13, ubuntu-22.04]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            apps/sourcerer-ui/src-tauri

      - name: Install Linux build deps (ubuntu only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/sourcerer-ui/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: apps/sourcerer-ui
        run: pnpm install --frozen-lockfile=false

      - name: Build app + upload to draft release (updater-signed)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Free ed25519/minisign updater signing. The private key + its
          # password are repo secrets; tauri bundles the .sig files and
          # tauri-action emits/uploads latest.json for the updater.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/sourcerer-ui
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: Sourcerer ${{ github.event.inputs.tag || github.ref_name }}
          releaseDraft: true
          prerelease: false
          # Emit + upload latest.json (the updater manifest the app polls).
          includeUpdaterJson: true
